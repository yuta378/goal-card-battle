<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚽ KSC Card Battle</title>
  <link rel="stylesheet" href="style.css" />
  <!-- ⚽ 絵文字をfaviconとして使う -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'><text y='32' font-size='32'>⚽</text></svg>">
</head>
<body>

<!-- ========== アカウント選択画面 ========== -->
<div id="screen-account" class="screen active">
  <div class="account-container">
      <h1 style="color: #FF00FF;">⚽ KSC Card Battle</h1>
    <p class="subtitle" style="color: #FFD700;">プレイヤーを選んでください</p>
    <div id="account-grid" class="account-grid"></div>
  </div>
</div>

<!-- ========== ロビー画面 ========== -->
<div id="screen-lobby" class="screen">
  <div class="lobby-container">
    <button id="btn-back-account" class="btn-back">← 戻る</button>
    <div id="selected-account-banner" class="selected-account-banner"></div>
    <h2 class="lobby-title">対戦する</h2>
    <div class="lobby-card">
      <button id="btn-create" class="btn btn-primary">🎮 ルームを作る</button>
      <div class="divider">または</div>
      <div class="join-group">
        <input id="input-room-id" type="text" placeholder="000"
               maxlength="3" inputmode="numeric" pattern="\d*" />
        <button id="btn-join" class="btn btn-secondary">🚪 参加する</button>
      </div>
    </div>
    <div id="room-info" class="room-info hidden">
      <p>ルームID：<strong id="display-room-id"></strong></p>
      <p class="hint">このIDを友達に伝えてください</p>
      <p id="waiting-msg" class="waiting-anim">⏳ 相手の参加を待っています...</p>
    </div>
    <div id="lobby-error" class="error-msg hidden"></div>
  </div>
</div>

<!-- ========== ゲーム画面 ========== -->
<div id="screen-game" class="screen">
  <div class="game-layout">

    <div class="scoreboard">
      <div class="score-block">
        <span class="score-label" id="my-name-label">あなた</span>
        <span class="score-num" id="score-me">0</span>
      </div>
      <div class="score-center">
        <span class="turn-info">ターン <span id="turn-num">1</span>/10</span>
        <span class="vs-label">VS</span>
      </div>
      <div class="score-block">
        <span class="score-num" id="score-opp">0</span>
        <span class="score-label" id="opp-name-label">相手</span>
      </div>
    </div>

    <div id="commentary" class="commentary">カードを選んでください</div>

    <div class="opponent-area">
      <div class="area-label">相手の手札</div>
      <div id="opp-hand" class="hand-display"></div>
    </div>

    <div class="battle-field">
      <div class="card-slot" id="slot-opp">
        <div class="card card-back" id="opp-card-display">?</div>
        <div class="slot-label" id="opp-slot-label">相手</div>
      </div>
      <div class="vs-badge">⚡</div>
      <div class="card-slot" id="slot-me">
        <div class="card card-placeholder" id="my-card-display">ここにドロップ</div>
        <div class="slot-label" id="my-slot-label">あなた</div>
      </div>
    </div>

    <div class="my-area">
      <div class="area-label">あなたの手札 <span id="hand-count"></span></div>
      <div id="my-hand" class="hand-cards"></div>
    </div>
    <!-- ========== スタンプエリア ========== -->
<div id="stamp-area" class="stamp-area">
  <button id="btn-stamp-toggle" class="btn-stamp-toggle">💬 スタンプ</button>
  <div id="stamp-panel" class="stamp-panel hidden">
  
    
    <button class="stamp-btn" data-stamp-id="1">
      <img src="images/stamp_1.webp" />
    </button>
    <button class="stamp-btn" data-stamp-id="2">
      <img src="images/stamp_2.webp" />
    </button>
   
  </div>
</div>

    <div id="option-area" class="option-area hidden">
      <div class="option-buttons">
        <button id="btn-yellow" class="btn btn-yellow">🟡 イエローカード</button>
        <button id="btn-red" class="btn btn-red">🔴 レッドカード</button>
      </div>
    </div>

    <!-- 勝敗モーダル -->
    <div id="result-modal" class="modal hidden">
      <div class="modal-content">
        <div id="result-icon" class="result-icon"></div>
        <div id="result-text" class="result-text"></div>
        <div id="result-cards" class="result-cards"></div>
        <div id="result-score" class="result-score"></div>
      </div>
    </div>

    <!-- ★★★ カウントダウンオーバーレイ（新規追加）★★★ -->
    <div id="countdown-overlay" class="countdown-overlay hidden">
      <div id="countdown-number" class="countdown-number">3</div>
    </div>

  </div>
</div>

<!-- ========== カード拡大モーダル ========== -->
<div id="card-zoom-modal" class="modal hidden">
  <div class="zoom-backdrop" id="zoom-backdrop">
    <div class="zoom-content">
      <button id="btn-close-zoom" class="btn-close-zoom">✕ 閉じる</button>
      <img id="zoom-card-img" src="" alt="" class="zoom-card-img" />
    </div>
  </div>
</div>

<!-- ========== 終了画面 ========== -->
<div id="screen-end" class="screen">
  <div class="end-container">
    <div id="end-result-image" class="end-result-image hidden">
      <img id="end-result-img" src="" alt="結果" />
    </div>
    <div id="end-icon" class="end-icon"></div>
    <h2 id="end-title"></h2>
    <div class="final-score">
      <span id="final-score-me"></span>
      <span class="final-vs">-</span>
      <span id="final-score-opp"></span>
    </div>
    <div id="pk-area" class="pk-area hidden">
      <h3>⚽ PK戦！</h3>
      <div id="pk-log" class="pk-log"></div>
      <button id="btn-pk" class="btn btn-primary">PKを蹴る！</button>
    </div>
    <div id="end-final-msg" class="end-final-msg hidden"></div>
    <button id="btn-restart" class="btn btn-primary hidden">
      🔄 アカウント選択に戻る
    </button>
  </div>
</div>

<script type="module" src="firebase-config.js"></script>
<script type="module" src="game.js"></script>
</body>
</html>
